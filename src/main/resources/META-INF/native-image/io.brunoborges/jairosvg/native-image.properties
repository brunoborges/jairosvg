# Java 25 preview support + CLI entrypoint + bundled colors resource used by Colors.class
# Keep double escaping in colors\\.properties: Java properties unescapes once before native-image reads the regex.
Args = --enable-preview -H:Class=io.brunoborges.jairosvg.cli.Main -H:Name=jairosvg -H:IncludeResources=io/brunoborges/jairosvg/css/colors\\.properties
