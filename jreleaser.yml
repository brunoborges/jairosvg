project:
  name: JairoSVG
  description: A Java port of CairoSVG - SVG 1.1 to PNG, PDF, JPEG, TIFF, PS and SVG converter
  longDescription: |
    JairoSVG is a pure Java SVG 1.1 renderer using Java2D. It converts SVG files
    to PNG, JPEG, TIFF, PDF, PostScript, EPS, and SVG formats. A direct port of
    the popular Python CairoSVG library, JairoSVG delivers native-level performance
    without requiring any native dependencies.
  website: https://github.com/brunoborges/jairosvg
  authors:
    - Bruno Borges
  license: LGPL-3.0
  inceptionYear: "2024"
  tags:
    - java
    - svg
    - png
    - pdf
    - converter
    - java2d
  java:
    groupId: io.brunoborges
    artifactId: jairosvg

signing:
  active: ALWAYS
  pgp:
    active: ALWAYS
    armored: true

deploy:
  maven:
    mavenCentral:
      app:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        stagingRepositories:
          - target/staging-deploy

release:
  github:
    owner: brunoborges
    name: jairosvg
    tagName: "v{{projectVersion}}"
    releaseName: "v{{projectVersion}}"
    overwrite: false
    skipTag: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: "- {{contributorName}}"
      hide:
        categories:
          - merge
        contributors:
          - dependabot
          - Copilot

distributions:
  jairosvg:
    type: SINGLE_JAR
    artifacts:
      - path: target/jairosvg-{{projectVersion}}.jar
  jairosvg-cli:
    type: SINGLE_JAR
    artifacts:
      - path: target/jairosvg-{{projectVersion}}-cli.jar
