name: Native Image CLI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'comparison/svg/**'
      - '.github/workflows/native-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'comparison/svg/**'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  native-image:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          # macOS disabled — AWT not supported in native-image on Darwin
          # See https://github.com/oracle/graal/issues/13272
          - os: windows-latest
            platform: windows
            arch: x64
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          cache: maven
      - name: Determine version
        id: version
        shell: bash
        run: |
          POM_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          echo "version=${POM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build shaded CLI JAR
        env:
          MAVEN_OPTS: --enable-preview
        run: ./mvnw -DskipTests package --no-transfer-progress
      - name: Collect native-image metadata with tracing agent (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shopt -s nullglob
          cli_jars=(target/*-cli.jar)
          mkdir -p native-config
          # Run a few representative SVGs to capture all AWT/Java2D JNI metadata
          for svg in comparison/svg/01_basic_shapes.svg comparison/svg/10_gradients.svg comparison/svg/20_filters.svg; do
            [ -f "$svg" ] || continue
            java --enable-preview -Djava.awt.headless=true \
              -agentlib:native-image-agent=config-merge-dir=native-config \
              -jar "${cli_jars[0]}" "$svg" -o "/tmp/$(basename "$svg" .svg).png"
          done
          echo "Collected metadata files:"
          ls -la native-config/
      - name: Collect native-image metadata with tracing agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cliJars = Get-ChildItem target\*-cli.jar
          New-Item -ItemType Directory -Force -Path native-config | Out-Null
          foreach ($svg in @("comparison\svg\01_basic_shapes.svg", "comparison\svg\10_gradients.svg", "comparison\svg\20_filters.svg")) {
            if (Test-Path $svg) {
              $name = [System.IO.Path]::GetFileNameWithoutExtension($svg)
              java --enable-preview -Djava.awt.headless=true `
                "-agentlib:native-image-agent=config-merge-dir=native-config" `
                -jar $cliJars[0].FullName $svg -o "$env:TEMP\$name.png"
            }
          }
          Write-Output "Collected metadata files:"
          Get-ChildItem native-config
      - name: Build native image (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shopt -s nullglob
          cli_jars=(target/*-cli.jar)
          if [ ${#cli_jars[@]} -eq 0 ]; then
            echo "No shaded CLI jar found in target/"
            exit 1
          fi
          VERSION="${{ steps.version.outputs.version }}"
          native-image --enable-preview \
            -Djava.awt.headless=true \
            -H:ConfigurationFileDirectories=native-config \
            -o "jairosvg-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}" \
            -jar "${cli_jars[0]}"
      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cliJars = Get-ChildItem target\*-cli.jar
          if ($cliJars.Count -eq 0) {
            Write-Error "No shaded CLI jar found in target\"
            exit 1
          }
          $version = "${{ steps.version.outputs.version }}"
          native-image --enable-preview `
            -Djava.awt.headless=true `
            "-H:ConfigurationFileDirectories=native-config" `
            -o "jairosvg-${version}-${{ matrix.platform }}-${{ matrix.arch }}" `
            -jar $cliJars[0].FullName
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./"jairosvg-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}" --help
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          & ".\jairosvg-${version}-${{ matrix.platform }}-${{ matrix.arch }}.exe" --help
      - name: Benchmark (Unix)
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="./jairosvg-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          OUT_DIR=$(mktemp -d)
          printf "%-40s %10s\n" "SVG Test Case" "Time (ms)"
          printf "%-40s %10s\n" "$(printf '%0.s-' {1..40})" "----------"
          total_ms=0
          count=0
          for svg in comparison/svg/*.svg; do
            name=$(basename "$svg" .svg)
            out="$OUT_DIR/${name}.png"
            start=$(date +%s%N 2>/dev/null || python3 -c 'import time; print(int(time.time_ns()))')
            "$BIN" "$svg" -o "$out"
            end=$(date +%s%N 2>/dev/null || python3 -c 'import time; print(int(time.time_ns()))')
            elapsed_ms=$(( (end - start) / 1000000 ))
            total_ms=$((total_ms + elapsed_ms))
            count=$((count + 1))
            printf "%-40s %10d\n" "$name" "$elapsed_ms"
          done
          printf "%-40s %10s\n" "$(printf '%0.s-' {1..40})" "----------"
          printf "%-40s %10d\n" "TOTAL ($count cases)" "$total_ms"
          avg=$((total_ms / count))
          printf "%-40s %10d\n" "AVERAGE" "$avg"
          rm -rf "$OUT_DIR"
      - name: Benchmark (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bin = ".\jairosvg-${version}-${{ matrix.platform }}-${{ matrix.arch }}.exe"
          $outDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "jairosvg-bench")
          "{0,-40} {1,10}" -f "SVG Test Case", "Time (ms)"
          "{0,-40} {1,10}" -f ("-" * 40), ("-" * 10)
          $totalMs = 0
          $count = 0
          foreach ($svg in Get-ChildItem comparison\svg\*.svg | Sort-Object Name) {
            $name = $svg.BaseName
            $out = Join-Path $outDir.FullName "$name.png"
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            & $bin $svg.FullName -o $out
            $sw.Stop()
            $ms = $sw.ElapsedMilliseconds
            $totalMs += $ms
            $count++
            "{0,-40} {1,10}" -f $name, $ms
          }
          "{0,-40} {1,10}" -f ("-" * 40), ("-" * 10)
          "{0,-40} {1,10}" -f "TOTAL ($count cases)", $totalMs
          $avg = [math]::Round($totalMs / $count)
          "{0,-40} {1,10}" -f "AVERAGE", $avg
          Remove-Item -Recurse -Force $outDir.FullName
      - name: Upload native binary
        if: always() && steps.version.outputs.version != ''
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: jairosvg-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}*
