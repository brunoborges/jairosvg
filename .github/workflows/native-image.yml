name: Native Image CLI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/native-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

jobs:
  native-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          cache: maven
          components: native-image
      - name: Build shaded CLI JAR
        run: ./mvnw -DskipTests package --no-transfer-progress
      - name: Build native image
        run: |
          CLI_JAR=$(ls target/*-cli.jar | head -n 1)
          native-image -jar "$CLI_JAR"
      - name: Smoke test native executable
        run: ./jairosvg --help
