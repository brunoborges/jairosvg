name: Native Image CLI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'comparison/svg/**'
      - '.github/workflows/native-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'comparison/svg/**'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  native-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          cache: maven
      - name: Determine version
        id: version
        run: |
          POM_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          echo "version=${POM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build shaded CLI JAR
        env:
          MAVEN_OPTS: --enable-preview
        run: ./mvnw -DskipTests package --no-transfer-progress
      - name: Collect native-image metadata with tracing agent
        run: |
          shopt -s nullglob
          cli_jars=(target/*-cli.jar)
          mkdir -p native-config
          for svg in comparison/svg/*.svg; do
            java --enable-preview -Djava.awt.headless=true \
              -agentlib:native-image-agent=config-merge-dir=native-config \
              -jar "${cli_jars[0]}" "$svg" -o "/tmp/$(basename "$svg" .svg).png"
          done
          echo "Collected metadata files:"
          ls -la native-config/
      - name: Build native image
        run: |
          shopt -s nullglob
          cli_jars=(target/*-cli.jar)
          if [ ${#cli_jars[@]} -eq 0 ]; then
            echo "No shaded CLI jar found in target/"
            exit 1
          fi
          VERSION="${{ steps.version.outputs.version }}"
          native-image --enable-preview \
            -Djava.awt.headless=true \
            -H:ConfigurationFileDirectories=native-config \
            -o "jairosvg-${VERSION}-linux-x64" \
            -jar "${cli_jars[0]}"
      - name: Smoke test
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./"jairosvg-${VERSION}-linux-x64" --help
      - name: Benchmark
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="./jairosvg-${VERSION}-linux-x64"
          OUT_DIR=$(mktemp -d)
          printf "%-40s %10s\n" "SVG Test Case" "Time (ms)"
          printf "%-40s %10s\n" "$(printf '%0.s-' {1..40})" "----------"
          total_ms=0
          count=0
          for svg in comparison/svg/*.svg; do
            name=$(basename "$svg" .svg)
            out="$OUT_DIR/${name}.png"
            start=$(date +%s%N)
            if "$BIN" "$svg" -o "$out" 2>/dev/null; then
              end=$(date +%s%N)
              elapsed_ms=$(( (end - start) / 1000000 ))
              total_ms=$((total_ms + elapsed_ms))
              count=$((count + 1))
              printf "%-40s %10d\n" "$name" "$elapsed_ms"
            else
              printf "%-40s %10s\n" "$name" "FAILED"
            fi
          done
          printf "%-40s %10s\n" "$(printf '%0.s-' {1..40})" "----------"
          printf "%-40s %10d\n" "TOTAL ($count cases)" "$total_ms"
          if [ "$count" -gt 0 ]; then
            avg=$((total_ms / count))
            printf "%-40s %10d\n" "AVERAGE" "$avg"
          fi
          rm -rf "$OUT_DIR"
      - name: Upload native binary
        if: always() && steps.version.outputs.version != ''
        uses: actions/upload-artifact@v7
        with:
          name: native-linux-x64
          path: jairosvg-${{ steps.version.outputs.version }}-linux-x64*
