name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JairoSVG
        run: ./mvnw install -DskipTests --no-transfer-progress

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install CairoSVG
        run: pip install cairosvg

      - name: Install JBang
        run: |
          curl -Ls https://sh.jbang.dev | bash -s - app setup
          echo "$HOME/.jbang/bin" >> $GITHUB_PATH

      - name: Run Benchmark
        shell: bash
        run: |
          set -eo pipefail
          # Sync JBang script dependency version with pom.xml so it never drifts
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          sed -i "s|io.brunoborges:jairosvg:[^ ]*|io.brunoborges:jairosvg:${VERSION}|" comparison/benchmark/benchmark.java
          jbang comparison/benchmark/benchmark.java --no-progress | tee /tmp/benchmark-output.txt

      - name: Post Summary
        run: |
          echo '## Benchmark Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
