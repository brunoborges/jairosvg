name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0). Leave empty to use the version from pom.xml."
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-jars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.release }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Determine release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "release=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            POM_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "Detected pom.xml version: ${POM_VERSION}"
            RELEASE_VERSION="${POM_VERSION%-SNAPSHOT}"
            echo "release=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set release version
        run: |
          VERSION="${{ steps.version.outputs.release }}"
          ./.github/workflows/scripts/bump-version.sh release ${VERSION}
          ./mvnw versions:set -DnewVersion=${VERSION} -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "Release v${VERSION}"
          git tag -f "v${VERSION}"
          git push origin main --tags --force

      - name: Build and stage artifacts
        run: ./mvnw clean deploy -Prelease --no-transfer-progress

      - name: Upload staged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staged-artifacts
          path: target/staging-deploy/

      - name: Upload release JARs
        uses: actions/upload-artifact@v7
        with:
          name: release-jars
          path: |
            target/jairosvg-*.jar
            !target/original-jairosvg-*.jar

  build-natives:
    needs: build-jars
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          # macOS disabled — AWT not supported in native-image on Darwin
          # See https://github.com/oracle/graal/issues/13272
          - os: windows-latest
            platform: windows
            arch: x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.build-jars.outputs.version }}

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          cache: maven

      - name: Build shaded CLI JAR
        env:
          MAVEN_OPTS: --enable-preview
        run: ./mvnw -DskipTests package --no-transfer-progress

      - name: Build native image (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shopt -s nullglob
          cli_jars=(target/*-cli.jar)
          if [ ${#cli_jars[@]} -eq 0 ]; then
            echo "No shaded CLI jar found in target/"
            exit 1
          fi
          VERSION="${{ needs.build-jars.outputs.version }}"
          native-image --enable-preview \
            -o "jairosvg-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}" \
            -jar "${cli_jars[0]}"

      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cliJars = Get-ChildItem target\*-cli.jar
          if ($cliJars.Count -eq 0) {
            Write-Error "No shaded CLI jar found in target\"
            exit 1
          }
          $version = "${{ needs.build-jars.outputs.version }}"
          native-image --enable-preview `
            -o "jairosvg-${version}-${{ matrix.platform }}-${{ matrix.arch }}" `
            -jar $cliJars[0].FullName

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ needs.build-jars.outputs.version }}"
          ./"jairosvg-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}" --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.build-jars.outputs.version }}"
          & ".\jairosvg-${version}-${{ matrix.platform }}-${{ matrix.arch }}.exe" --help

      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: jairosvg-${{ needs.build-jars.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}*

  release:
    needs: [build-jars, build-natives]
    if: always() && needs.build-jars.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: v${{ needs.build-jars.outputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          name: staged-artifacts
          path: target/staging-deploy/

      - name: Download release JARs
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: target/

      - name: Download native binaries
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: target/native/

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ needs.build-jars.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_APP_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_APP_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties

      - name: Bump to next SNAPSHOT version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          VERSION="${{ needs.build-jars.outputs.version }}"
          IFS='.' read -r major minor patch <<< "${VERSION}"
          NEXT_VERSION="${major}.${minor}.$((patch + 1))"
          ./.github/workflows/scripts/bump-version.sh snapshot ${NEXT_VERSION}
          ./mvnw versions:set -DnewVersion=${NEXT_VERSION}-SNAPSHOT -DgenerateBackupPoms=false --no-transfer-progress
          git commit -am "Bump version to ${NEXT_VERSION}-SNAPSHOT"
          git push origin main

      - name: Close released milestone and create next
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-jars.outputs.version }}"
          IFS='.' read -r major minor patch <<< "${VERSION}"
          NEXT_VERSION="${major}.${minor}.$((patch + 1))"

          # Close the milestone for the released version (if it exists)
          MILESTONE_NUMBER=$(gh api "repos/${{ github.repository }}/milestones?state=open&per_page=100" \
            --jq ".[] | select(.title == \"${VERSION}\") | .number")
          if [ -n "$MILESTONE_NUMBER" ]; then
            gh api "repos/${{ github.repository }}/milestones/$MILESTONE_NUMBER" \
              -X PATCH -f state=closed --silent
            echo "Closed milestone ${VERSION}"
          fi

          # Create the next milestone (skip if it already exists)
          EXISTING=$(gh api "repos/${{ github.repository }}/milestones?state=open&per_page=100" \
            --jq ".[] | select(.title == \"${NEXT_VERSION}\") | .number")
          if [ -z "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/milestones" \
              -f title="${NEXT_VERSION}" -f state=open \
              -f description="Next development release" --silent
            echo "Created milestone ${NEXT_VERSION}"
          else
            echo "Milestone ${NEXT_VERSION} already exists, skipping"
          fi

      - name: Trigger site deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run site.yml
