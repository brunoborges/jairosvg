<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260">
  <!-- Background -->
  <rect width="400" height="260" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="15" fill="white"
        text-anchor="middle" font-weight="bold">calc() — Basic Arithmetic</text>

  <!-- Subtitle labels -->
  <text x="10" y="58" font-family="monospace" font-size="11" fill="#aaaacc">width=calc(200px - 100px)</text>
  <text x="10" y="108" font-family="monospace" font-size="11" fill="#aaaacc">width=calc(50px + 50px)</text>
  <text x="10" y="158" font-family="monospace" font-size="11" fill="#aaaacc">width=calc(3 * 40px)</text>
  <text x="10" y="208" font-family="monospace" font-size="11" fill="#aaaacc">width=calc(200px / 2)</text>

  <!-- Bars -->
  <rect x="10" y="62" width="calc(200px - 100px)" height="30" fill="#e94560" rx="4"/>
  <rect x="10" y="112" width="calc(50px + 50px)" height="30" fill="#0f3460" rx="4"/>
  <rect x="10" y="162" width="calc(3 * 40px)" height="30" fill="#16213e" rx="4"/>
  <rect x="10" y="212" width="calc(200px / 2)" height="30" fill="#533483" rx="4"/>

  <!-- Value labels -->
  <text x="120" y="82" font-family="monospace" font-size="12" fill="white" text-anchor="middle">= 100px</text>
  <text x="120" y="132" font-family="monospace" font-size="12" fill="white" text-anchor="middle">= 100px</text>
  <text x="130" y="182" font-family="monospace" font-size="12" fill="white" text-anchor="middle">= 120px</text>
  <text x="120" y="232" font-family="monospace" font-size="12" fill="white" text-anchor="middle">= 100px</text>
</svg>
