<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="4" fill="#e74c3c"/>
    </pattern>
    <pattern id="stripes" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="12" y2="12" stroke="#3498db" stroke-width="2"/>
      <line x1="12" y1="0" x2="0" y2="12" stroke="#3498db" stroke-width="2"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#2ecc71" fill-opacity="0.2"/>
      <path d="M30,0 L0,0 0,30" fill="none" stroke="#2ecc71" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#ecf0f1"/>
  <rect x="20" y="20" width="160" height="120" fill="url(#dots)" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="310" cy="80" r="70" fill="url(#stripes)" stroke="#2c3e50" stroke-width="2"/>
  <rect x="20" y="160" width="360" height="120" rx="10" fill="url(#grid)" stroke="#2c3e50" stroke-width="2"/>
  <text x="100" y="230" text-anchor="middle" font-size="16" fill="#2c3e50">Patterns</text>
</svg>
