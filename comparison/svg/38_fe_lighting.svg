<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f7f9fb"/>

  <text x="150" y="18" text-anchor="middle" font-size="13" fill="#555"
        font-family="Arial, Helvetica, sans-serif">feDiffuseLighting &amp; feSpecularLighting</text>

  <defs>
    <!-- Bump source: blurred text -->
    <filter id="bumpSource" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
    </filter>

    <!-- Diffuse lighting with distant light -->
    <filter id="diffuseDistant" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bump"/>
      <feDiffuseLighting in="bump" surfaceScale="5" diffuseConstant="1"
                         lighting-color="white" result="light">
        <feDistantLight azimuth="225" elevation="45"/>
      </feDiffuseLighting>
      <feComposite in="light" in2="SourceAlpha" operator="in"/>
    </filter>

    <!-- Diffuse lighting with point light -->
    <filter id="diffusePoint" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bump"/>
      <feDiffuseLighting in="bump" surfaceScale="4" diffuseConstant="1.2"
                         lighting-color="#ffe0b2" result="light">
        <fePointLight x="40" y="30" z="80"/>
      </feDiffuseLighting>
      <feComposite in="light" in2="SourceAlpha" operator="in"/>
    </filter>

    <!-- Specular lighting with distant light -->
    <filter id="specDistant" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bump"/>
      <feSpecularLighting in="bump" surfaceScale="5" specularConstant="1.5"
                          specularExponent="20" lighting-color="white" result="spec">
        <feDistantLight azimuth="225" elevation="50"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMask"/>
      <feComposite in="SourceGraphic" in2="specMask" operator="arithmetic"
                   k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <!-- Specular lighting with point light -->
    <filter id="specPoint" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bump"/>
      <feSpecularLighting in="bump" surfaceScale="6" specularConstant="2"
                          specularExponent="30" lighting-color="#c0e0ff" result="spec">
        <fePointLight x="60" y="20" z="100"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMask"/>
      <feComposite in="SourceGraphic" in2="specMask" operator="arithmetic"
                   k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555" text-anchor="middle">
    <!-- Diffuse distant -->
    <text x="55" y="35">diffuse distant</text>
    <circle cx="55" cy="65" r="22" fill="#3498db" filter="url(#diffuseDistant)"/>

    <!-- Diffuse point -->
    <text x="150" y="35">diffuse point</text>
    <circle cx="150" cy="65" r="22" fill="#3498db" filter="url(#diffusePoint)"/>

    <!-- No filter reference -->
    <text x="245" y="35">no filter</text>
    <circle cx="245" cy="65" r="22" fill="#3498db"/>

    <!-- Specular distant -->
    <text x="55" y="110">specular distant</text>
    <circle cx="55" cy="140" r="22" fill="#e74c3c" filter="url(#specDistant)"/>

    <!-- Specular point -->
    <text x="150" y="110">specular point</text>
    <circle cx="150" cy="140" r="22" fill="#e74c3c" filter="url(#specPoint)"/>

    <!-- Text with specular -->
    <text x="245" y="110">spec on text</text>
    <text x="245" y="150" font-size="28" fill="#2c3e50" font-weight="bold"
          font-family="Arial, Helvetica, sans-serif"
          filter="url(#specDistant)">Lit</text>
  </g>
</svg>
