<svg xmlns="http://www.w3.org/2000/svg" width="420" height="220" viewBox="0 0 420 220">
  <rect width="420" height="220" fill="#f7f9fb"/>

  <text x="210" y="25" text-anchor="middle" font-size="16" fill="#555"
        font-family="Arial, Helvetica, sans-serif">currentColor Inheritance</text>

  <!-- Group 1: blue context -->
  <g color="#2c7be5">
    <rect x="20" y="40" width="110" height="70" rx="8" fill="currentColor"/>
    <text x="75" y="125" text-anchor="middle" font-size="11" fill="#555"
          font-family="Arial, Helvetica, sans-serif">fill=currentColor</text>
  </g>

  <!-- Group 2: red context with stroke -->
  <g color="#e74c3c">
    <rect x="150" y="40" width="110" height="70" rx="8"
          fill="none" stroke="currentColor" stroke-width="4"/>
    <text x="205" y="125" text-anchor="middle" font-size="11" fill="#555"
          font-family="Arial, Helvetica, sans-serif">stroke=currentColor</text>
  </g>

  <!-- Group 3: nested inheritance -->
  <g color="#27ae60">
    <g>
      <circle cx="340" cy="75" r="35" fill="currentColor"/>
    </g>
    <text x="340" y="125" text-anchor="middle" font-size="11" fill="#555"
          font-family="Arial, Helvetica, sans-serif">nested inherit</text>
  </g>

  <!-- Group 4: override in child -->
  <g color="#9b59b6">
    <rect x="20" y="145" width="80" height="50" rx="8" fill="currentColor"/>
    <g color="#f39c12">
      <rect x="115" y="145" width="80" height="50" rx="8" fill="currentColor"/>
    </g>
    <text x="60" y="210" text-anchor="middle" font-size="10" fill="#555"
          font-family="Arial, Helvetica, sans-serif">parent</text>
    <text x="155" y="210" text-anchor="middle" font-size="10" fill="#555"
          font-family="Arial, Helvetica, sans-serif">child override</text>
  </g>

  <!-- Group 5: gradient stop with currentColor -->
  <g color="#e74c3c">
    <defs>
      <linearGradient id="ccGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="currentColor"/>
        <stop offset="100%" stop-color="#3498db"/>
      </linearGradient>
    </defs>
    <rect x="230" y="145" width="170" height="50" rx="8" fill="url(#ccGrad)"/>
    <text x="315" y="210" text-anchor="middle" font-size="10" fill="#555"
          font-family="Arial, Helvetica, sans-serif">gradient stop=currentColor</text>
  </g>
</svg>
