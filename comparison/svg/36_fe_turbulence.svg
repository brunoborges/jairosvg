<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f7f9fb"/>

  <text x="150" y="18" text-anchor="middle" font-size="14" fill="#555"
        font-family="Arial, Helvetica, sans-serif">feTurbulence — Turbulence &amp; Fractal Noise</text>

  <defs>
    <!-- Turbulence, low frequency -->
    <filter id="turb1" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" seed="1"/>
    </filter>

    <!-- Turbulence, higher frequency -->
    <filter id="turb2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.15" numOctaves="2" seed="1"/>
    </filter>

    <!-- Fractal noise, low frequency -->
    <filter id="fractal1" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="1"/>
    </filter>

    <!-- Fractal noise, higher frequency -->
    <filter id="fractal2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="2" seed="1"/>
    </filter>

    <!-- Turbulence with more octaves -->
    <filter id="turb3" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="5" seed="1"/>
    </filter>

    <!-- Fractal noise with more octaves -->
    <filter id="fractal3" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="5" seed="1"/>
    </filter>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555" text-anchor="middle">
    <!-- Row 1: type comparison -->
    <text x="45" y="35">turbulence 0.05</text>
    <rect x="5" y="38" width="80" height="50" rx="4" filter="url(#turb1)"/>

    <text x="150" y="35">turbulence 0.15</text>
    <rect x="110" y="38" width="80" height="50" rx="4" filter="url(#turb2)"/>

    <text x="255" y="35">turb octaves=5</text>
    <rect x="215" y="38" width="80" height="50" rx="4" filter="url(#turb3)"/>

    <!-- Row 2: fractal noise -->
    <text x="45" y="105">fractalNoise 0.05</text>
    <rect x="5" y="108" width="80" height="50" rx="4" filter="url(#fractal1)"/>

    <text x="150" y="105">fractalNoise 0.15</text>
    <rect x="110" y="108" width="80" height="50" rx="4" filter="url(#fractal2)"/>

    <text x="255" y="105">fNoise octaves=5</text>
    <rect x="215" y="108" width="80" height="50" rx="4" filter="url(#fractal3)"/>
  </g>

  <text x="150" y="185" text-anchor="middle" font-size="10" fill="#888"
        font-family="Arial, Helvetica, sans-serif">
    Top: turbulence — Bottom: fractalNoise — seed=1 for all
  </text>
</svg>
