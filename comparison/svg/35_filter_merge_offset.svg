<svg xmlns="http://www.w3.org/2000/svg" width="420" height="220" viewBox="0 0 420 220">
  <rect width="420" height="220" fill="#f7f9fb"/>

  <text x="210" y="25" text-anchor="middle" font-size="16" fill="#555"
        font-family="Arial, Helvetica, sans-serif">Filter Primitives — feMerge &amp; feOffset</text>

  <defs>
    <!-- Simple feOffset shadow -->
    <filter id="fOffset" filterUnits="userSpaceOnUse"
            x="-10" y="-10" width="200" height="150">
      <feOffset in="SourceGraphic" dx="6" dy="6" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.3" result="shadow-color"/>
      <feComposite in="shadow-color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- feOffset only (no merge) -->
    <filter id="fOffsetOnly" filterUnits="userSpaceOnUse"
            x="0" y="0" width="200" height="150">
      <feOffset dx="15" dy="15"/>
    </filter>

    <!-- feMerge layering: flood + source -->
    <filter id="fMergeFlood">
      <feFlood flood-color="#e74c3c" flood-opacity="0.4" result="red"/>
      <feMerge>
        <feMergeNode in="red"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Multi-layer feMerge -->
    <filter id="fMultiMerge" filterUnits="userSpaceOnUse"
            x="-20" y="-20" width="200" height="150">
      <feOffset in="SourceGraphic" dx="8" dy="8" result="off1"/>
      <feOffset in="SourceGraphic" dx="4" dy="4" result="off2"/>
      <feMerge>
        <feMergeNode in="off1"/>
        <feMergeNode in="off2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- feOffset shadow -->
  <text x="75" y="55" text-anchor="middle" font-size="11" fill="#555"
        font-family="Arial, Helvetica, sans-serif">offset shadow</text>
  <rect x="20" y="60" width="110" height="60" rx="10" fill="#2c7be5"
        filter="url(#fOffset)"/>

  <!-- feOffset only (shifted element) -->
  <text x="240" y="55" text-anchor="middle" font-size="11" fill="#555"
        font-family="Arial, Helvetica, sans-serif">feOffset only (dx=15, dy=15)</text>
  <rect x="195" y="60" width="60" height="40" rx="6" fill="#27ae60"
        filter="url(#fOffsetOnly)"/>

  <!-- feMerge with flood overlay -->
  <text x="370" y="55" text-anchor="middle" font-size="11" fill="#555"
        font-family="Arial, Helvetica, sans-serif">feMerge + feFlood</text>
  <rect x="320" y="60" width="100" height="60" rx="10" fill="#3498db"
        filter="url(#fMergeFlood)"/>

  <!-- Multi-layer offset merge -->
  <text x="100" y="155" text-anchor="middle" font-size="11" fill="#555"
        font-family="Arial, Helvetica, sans-serif">multi-layer feMerge</text>
  <rect x="30" y="160" width="80" height="45" rx="8" fill="#9b59b6"
        filter="url(#fMultiMerge)"/>

  <!-- Text with offset shadow -->
  <text x="250" y="165" font-size="11" fill="#555" font-family="Arial, Helvetica, sans-serif">text with shadow filter:</text>
  <text x="250" y="195" font-size="28" fill="#e67e22" font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" filter="url(#fOffset)">Shadow</text>
</svg>
