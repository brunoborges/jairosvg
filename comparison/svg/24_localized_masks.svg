<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <defs>
    <!-- Localized masks: content confined to element area (no full-canvas rect) -->
    <linearGradient id="radFade" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"
        gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
    <linearGradient id="hFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
    <linearGradient id="vFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>

    <mask id="spotMask1">
      <circle cx="100" cy="100" r="55" fill="white"/>
    </mask>
    <mask id="spotMask2">
      <circle cx="300" cy="100" r="55" fill="url(#hFade)"/>
    </mask>
    <mask id="spotMask3">
      <ellipse cx="550" cy="100" rx="70" ry="45" fill="white"/>
    </mask>
    <mask id="spotMask4">
      <rect x="55" y="265" width="110" height="80" rx="12" fill="url(#vFade)"/>
    </mask>
    <mask id="spotMask5">
      <circle cx="300" cy="310" r="50" fill="white"/>
      <circle cx="300" cy="310" r="25" fill="gray"/>
    </mask>
    <mask id="spotMask6">
      <polygon points="550,265 600,345 500,345" fill="white"/>
    </mask>
    <mask id="spotMask7">
      <rect x="55" y="455" width="100" height="80" fill="white"/>
    </mask>
    <mask id="spotMask8">
      <circle cx="300" cy="500" r="50" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Row 1: Masked shapes (top) -->
  <rect x="50" y="50" width="100" height="100" rx="8" fill="#e74c3c" mask="url(#spotMask1)"/>
  <rect x="250" y="50" width="100" height="100" rx="8" fill="#3498db" mask="url(#spotMask2)"/>
  <rect x="480" y="55" width="140" height="90" rx="8" fill="#9b59b6" mask="url(#spotMask3)"/>

  <!-- Row 2: More masked shapes (middle) -->
  <rect x="50" y="260" width="120" height="90" rx="6" fill="#2ecc71" mask="url(#spotMask4)"/>
  <circle cx="300" cy="310" r="55" fill="#f39c12" mask="url(#spotMask5)"/>
  <rect x="490" y="260" width="120" height="90" fill="#e67e22" mask="url(#spotMask6)"/>

  <!-- Row 3: Opacity groups (bottom) -->
  <g opacity="0.6">
    <rect x="50" y="450" width="110" height="90" rx="10" fill="#1abc9c"/>
    <circle cx="105" cy="495" r="30" fill="#16a085"/>
  </g>
  <g opacity="0.5">
    <rect x="250" y="450" width="110" height="90" rx="10" fill="#2980b9"/>
    <circle cx="305" cy="495" r="30" fill="#3498db"/>
  </g>
  <g opacity="0.7">
    <rect x="450" y="450" width="110" height="90" rx="10" fill="#8e44ad"/>
    <circle cx="505" cy="495" r="30" fill="#9b59b6"/>
    <rect x="470" y="460" width="30" height="30" fill="#d35400"/>
  </g>
  <g opacity="0.4">
    <rect x="620" y="450" width="130" height="90" rx="10" fill="#c0392b"/>
    <ellipse cx="685" cy="495" rx="40" ry="25" fill="#e74c3c"/>
  </g>

  <!-- Unmasked elements (verify no regression) -->
  <rect x="660" y="50" width="100" height="100" rx="8" fill="#34495e"/>
  <rect x="660" y="200" width="100" height="100" rx="8" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="2"/>

  <!-- Masked shapes in row 3 area -->
  <rect x="50" y="450" width="100" height="80" fill="#e74c3c" mask="url(#spotMask7)"/>
  <circle cx="300" cy="500" r="55" fill="#3498db" mask="url(#spotMask8)"/>
</svg>
