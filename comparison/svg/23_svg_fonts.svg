<svg xmlns="http://www.w3.org/2000/svg" width="420" height="220" viewBox="0 0 420 220">
  <rect width="420" height="220" fill="#f7f9fb"/>

  <defs>
    <!-- Block-letter font: each glyph is a simple geometric shape -->
    <font id="BlockFont" horiz-adv-x="1000">
      <font-face font-family="BlockFont" units-per-em="1000" ascent="800" descent="-200"/>
      <glyph unicode="S" horiz-adv-x="900"
             d="M 800 700 Q 800 800 500 800 Q 200 800 200 700 L 200 500
                Q 200 400 500 400 Q 800 400 800 300 L 800 100
                Q 800 0 500 0 Q 200 0 200 100 L 350 100
                Q 350 80 500 80 Q 650 80 650 100 L 650 300
                Q 650 320 500 320 Q 200 320 200 500 L 200 700
                Q 200 720 500 720 Q 650 720 650 700 Z"/>
      <glyph unicode="V" horiz-adv-x="900"
             d="M 0 800 L 150 800 L 450 150 L 750 800 L 900 800 L 500 0 L 400 0 Z"/>
      <glyph unicode="G" horiz-adv-x="900"
             d="M 800 200 Q 800 0 450 0 Q 100 0 100 200 L 100 600
                Q 100 800 450 800 Q 800 800 800 600 L 650 600
                Q 650 720 450 720 Q 250 720 250 600 L 250 200
                Q 250 80 450 80 Q 650 80 650 200 L 650 350 L 450 350 L 450 450 L 800 450 Z"/>
      <missing-glyph horiz-adv-x="600"
             d="M 50 0 L 50 800 L 550 800 L 550 0 Z M 150 100 L 450 100 L 450 700 L 150 700 Z"/>
    </font>
  </defs>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="16" fill="#555"
        font-family="Arial, Helvetica, sans-serif">SVG Fonts — Custom Glyphs</text>

  <!-- Row 1: Custom font rendering -->
  <text x="20" y="110" font-family="BlockFont" font-size="72" fill="#2c7be5">SVG</text>

  <!-- Row 2: Missing glyph fallback (Z is not defined) -->
  <text x="20" y="190" font-family="BlockFont" font-size="48" fill="#e74c3c">SVG?Z</text>

  <!-- Label -->
  <text x="380" y="110" font-size="11" fill="#888" font-family="Arial, Helvetica, sans-serif"
        text-anchor="end">custom glyphs</text>
  <text x="380" y="190" font-size="11" fill="#888" font-family="Arial, Helvetica, sans-serif"
        text-anchor="end">missing-glyph ▸</text>
</svg>
